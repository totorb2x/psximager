name: Compilation Windows PSXImager

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Recupere les sources
      uses: actions/checkout@v4

    - name: Compile les fichiers pour Linux
      run: |
        gcc -O2 src/psxrip.c -o psxrip
        gcc -O2 src/psxbuild.c -o psxbuild
        gcc -O2 src/psxinject.c -o psxinject

    - name: Livre les fichiers Linux
      uses: actions/upload-artifact@v4
      with:
        name: psximager-linux
        path: |
          psxrip
          psxinject
          psxbuild
